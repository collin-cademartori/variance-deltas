name: Build Windows

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5
          dune-cache: true
          opam-local-packages: model_parser/*.opam

      - name: Install fg_parser OCaml dependencies
        run: opam install fg_parser --deps-only -y

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Restore vcpkg cache
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}\.vcpkg-archives
          key: vcpkg-x64-windows-static-${{ hashFiles('backend/src/vcpkg.json') }}
          restore-keys: vcpkg-x64-windows-static-

      - name: Install vcpkg dependencies
        working-directory: backend/src
        run: |
          New-Item -ItemType Directory -Path "${{ github.workspace }}\.vcpkg-archives" -Force | Out-Null
          vcpkg install --triplet x64-windows-static
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-archives
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}\\.vcpkg-archives,readwrite"

      - name: Save vcpkg cache
        if: steps.vcpkg-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}\.vcpkg-archives
          key: vcpkg-x64-windows-static-${{ hashFiles('backend/src/vcpkg.json') }}

      - name: Install Simple-WebSocket-Server headers
        run: |
          git clone --depth 1 https://gitlab.com/eidheim/Simple-WebSocket-Server.git $env:TEMP\simple-ws
          New-Item -ItemType Directory -Path "${{ github.workspace }}\backend\include\simple-websocket-server" -Force | Out-Null
          Copy-Item "$env:TEMP\simple-ws\*.hpp" "${{ github.workspace }}\backend\include\simple-websocket-server\"

      - name: Build
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          .\build.ps1
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-archives
          VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}\\.vcpkg-archives,readwrite"

      - name: Include install script
        run: Copy-Item install.ps1 build\

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: variance-deltas-windows-x64
          path: build/
          retention-days: 3
